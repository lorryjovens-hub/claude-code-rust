name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: Rust 代码检查
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: 安装 Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        components: rustfmt, clippy
    
    - name: 缓存 cargo 依赖
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: 检查代码格式
      run: cargo fmt -- --check
    
    - name: 运行 Clippy
      run: cargo clippy -- -D warnings
    
    - name: 构建项目
      run: cargo build --verbose
    
    - name: 运行测试
      run: cargo test --verbose

  gui-client-check:
    name: GUI 客户端检查
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gui-client
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 安装 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './gui-client/package-lock.json'
    
    - name: 安装依赖
      run: npm ci
    
    - name: 运行 ESLint
      run: npm run lint
    
    - name: 构建项目
      run: npm run build
    
    - name: 运行测试
      run: npm test -- --passWithNoTests

  security-audit:
    name: 安全审计
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: 安装 Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: 运行 cargo audit
      run: |
        cargo install cargo-audit
        cargo audit
