name: 发布 - 构建和发布新版本

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: 构建 ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: claude_code_rs
            asset_name: claude-code-rust-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: claude_code_rs.exe
            asset_name: claude-code-rust-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: claude_code_rs
            asset_name: claude-code-rust-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: claude_code_rs
            asset_name: claude-code-rust-macos-arm64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 构建 Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: 上传资源到发布
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  docker:
    name: 构建 Docker 镜像
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            claude-code-rust:${{ github.ref_name }}
            claude-code-rust:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
