name: 欢迎新贡献者

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
    - name: 欢迎新贡献者
      uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: |
          🎉 欢迎来到 Claude Code Rust 项目！
          
          感谢您提交 Issue。我们的维护者会尽快查看并回复您。
          
          在等待期间，您可以：
          - 查看我们的 [贡献指南](../blob/main/CONTRIBUTING.md)
          - 加入 [Discussions](../discussions) 参与社区讨论
          
          祝您使用愉快！
        pr-message: |
          🎉 感谢您为 Claude Code Rust 项目做出贡献！
          
          您的 Pull Request 已收到，我们的维护者会尽快进行审核。
          
          在此期间，请确保：
          - [ ] 所有测试都已通过
          - [ ] 代码遵循项目规范
          - [ ] 文档已更新（如需要）
          
          再次感谢您的贡献！
